<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RAJATECH Premium Ecosystem</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Dashboard Specific Premium CSS */
        .dash-body {
            display: flex; flex-direction: column; justify-content: flex-start;
            background: radial-gradient(circle at top right, #1e293b, #050816);
            padding-top: 100px;
        }

        .dash-container {
            width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px;
            display: flex; justify-content: center;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            width: 100%; max-width: 500px;
            padding: 40px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 0.8s ease;
        }

        .profile-header { position: relative; margin-bottom: 25px; }

        .avatar-wrapper {
            width: 130px; height: 130px; margin: 0 auto 15px;
            border-radius: 50%; border: 4px solid #00f2fe;
            overflow: hidden; box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        #userDP { width: 100%; height: 100%; object-fit: cover; }

        .status-tag {
            position: absolute; top: 10px; right: 10px;
            background: #00f2fe; color: #0f172a;
            padding: 3px 10px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 700;
        }

        #userName { font-size: 1.8rem; color: #fff; margin-bottom: 5px; }
        #userEmail { color: #94a3b8; font-size: 0.95rem; margin-bottom: 25px; }

        .info-panel {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 15px; padding: 15px; text-align: left;
            margin-bottom: 30px; font-size: 0.9rem;
        }
        .info-panel p { color: #64748b; margin-bottom: 5px; }
        .info-panel span { color: #fff; font-weight: 500; }

        /* Update Image Section */
        .update-section { text-align: left; margin-bottom: 30px; }
        .update-section h3 { font-size: 1rem; color: #fff; margin-bottom: 15px; }

        .input-group { display: flex; gap: 10px; flex-direction: column; }
        .input-group input {
            padding: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: #fff; font-size: 0.9rem;
        }
        .btn-update {
            background: transparent; border: 1px solid #00f2fe;
            color: #00f2fe; font-weight: 600; cursor: pointer;
            transition: 0.3s;
        }
        .btn-update:hover { background: #00f2fe; color: #0f172a; }

        /* Buttons Fix */
        .dash-btns { display: flex; gap: 15px; margin-top: 30px; }
        .btn-dash {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-refresh { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-refresh:hover { background: rgba(255,255,255,0.2); }

        .btn-logout { background: #ff4757; color: #fff; }
        .btn-logout:hover { background: #ff6b81; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); }

        /* Header Fix for Logout Button */
        .dash-header {
            position: fixed; top: 0; left: 0; width: 100%; padding: 20px 8%;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 1.5rem; color: #fff; }
        .logo span { color: #00f2fe; }
        .nav-logout {
            padding: 8px 20px; background: #ff4757; color: #fff;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .profile-card { padding: 30px 20px; }
            #userName { font-size: 1.5rem; }
        }
    </style>
</head>
<body class="dash-body">

    <header class="dash-header">
        <h2 class="logo">RAJA<span>TECH</span></h2>
        <button id="navLogoutBtn" class="nav-logout">Logout</button>
    </header>

    <main class="dash-container">
        <div class="profile-card">
            <div class="profile-header">
                <span class="status-tag">VERIFIED USER</span>
                <div class="avatar-wrapper">
                    <img id="userDP" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile Picture">
                </div>
                <h1 id="userName">User Name</h1>
                <p id="userEmail">user@example.com</p>
            </div>

            <div class="update-section">
                <h3>Update Profile Picture</h3>
                <div class="input-group">
                    <input type="text" id="photoURL" placeholder="Paste Direct Image URL (jpg/png)">
                    <button id="btnUpdate" class="btn-dash btn-update">Update Image Now</button>
                </div>
                <small style="color: #64748b; font-size: 0.8rem; margin-top: 10px; display: block;">
                    Tip: Use direct links from ImgBB or postimages.org
                </small>
            </div>

            <div class="info-panel">
                <p>Status: <span>Active</span></p>
                <p>Security Level: <span>High</span></p>
            </div>

            <div class="dash-btns">
                <button id="btnRefresh" class="btn-dash btn-refresh">Refresh Stats</button>
                <button id="btnLogout" class="btn-dash btn-logout">Secure Logout</button>
            </div>
        </div>
    </main>

    <footer style="text-align: center; color: #475569; padding: 40px; font-size: 0.8rem;">
        &copy; 2026 RAJATECH Premium Ecosystem. All Rights Reserved.
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- Your Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCMwFJfbkdFjxWzNhMccXs9FbhqntSKdRM",
            authDomain: "portfolio-auth-19a5e.firebaseapp.com",
            projectId: "portfolio-auth-19a5e",
            storageBucket: "portfolio-auth-19a5e.firebasestorage.app",
            messagingSenderId: "211741915178",
            appId: "1:211741915178:web:b96f48f37ef2477b83ab53"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Toast Popup Helper
        const toast = (icon, title) => {
            Swal.fire({ icon, title, background: '#1e293b', color: '#fff', timer: 2000, showConfirmButton: false });
        };

        // --- Core Dashboard Logic ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User is signed in, fetch Firestore data
                const userDocRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userDocRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // 1. Display Real Name and Email
                    document.getElementById('userName').innerText = data.username;
                    document.getElementById('userEmail').innerText = data.email;
                    
                    // 2. Load Profile Image (if exists)
                    if(data.profilePic) {
                        document.getElementById('userDP').src = data.profilePic;
                    }

                    // 3. Update Image Functionality
                    document.getElementById('btnUpdate').onclick = async () => {
                        const url = document.getElementById('photoURL').value.trim();
                        
                        if(url) {
                            // Professional regex check for simple URL validation (optional but good)
                            if(url.match(/\.(jpeg|jpg|gif|png)$/) != null || url.startsWith('https://')) {
                                try {
                                    await updateDoc(userDocRef, { profilePic: url });
                                    toast('success', 'Profile Image Updated!');
                                    setTimeout(() => location.reload(), 1500); // Reload to show new image
                                } catch (err) { toast('error', 'Update Failed!'); }
                            } else {
                                toast('warning', 'Invalid image URL!');
                            }
                        } else { toast('warning', 'Please paste a URL!'); }
                    };

                    // 4. Refresh Button Functionality
                    document.getElementById('btnRefresh').onclick = () => {
                        toast('success', 'Refreshing Stats...');
                        setTimeout(() => location.reload(), 1000);
                    };

                } else { console.log("No such document!"); }

            } else {
                // User is signed out, redirect to login
                window.location.href = "index.html";
            }
        });

        // --- Logout Functionality (Top Nav & Card Button) ---
        const handleLogout = () => {
            Swal.fire({
                title: 'Logout?', text: "Are you sure you want to end session?",
                icon: 'warning', showCancelButton: true, confirmButtonColor: '#ff4757',
                cancelButtonColor: '#1e293b', confirmButtonText: 'Yes, Logout',
                background: '#1e293b', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    signOut(auth).then(() => {
                        window.location.href = "index.html";
                    });
                }
            });
        };

        document.getElementById('btnLogout').onclick = handleLogout;
        document.getElementById('navLogoutBtn').onclick = handleLogout;

    </script>
</body>
</html>
