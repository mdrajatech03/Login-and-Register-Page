<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RajaTech | Professional Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary-color: #00f2fe;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }

        /* Header Setup */
        .header {
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 1.8rem; font-weight: 700; color: var(--primary-color); }

        #btnLogout {
            padding: 8px 20px;
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 50px;
            cursor: pointer;
        }

        /* Profile Card & IMAGE FIX */
        .main-container { margin-top: 150px; display: flex; justify-content: center; }

        .profile-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- IMAGE FIX START --- */
        .img-area {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            position: relative;
        }

        #userDP {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            /* Ye lines image ko kharab hone se rokengi */
            object-fit: cover; 
            object-position: center;
            display: block;
            background-color: #1e293b; /* Image load hone tak background dikhega */
        }
        /* --- IMAGE FIX END --- */

        .input-group { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }

        input[type="text"] {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
        }

        #btnUpdatePhoto {
            padding: 12px;
            border-radius: 10px;
            background: var(--primary-color);
            color: #000;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">RAJATECH</div>
        <button id="btnLogout">Logout</button>
    </header>

    <div class="main-container">
        <div class="profile-card">
            <div class="img-area">
                <img id="userDP" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile">
            </div>
            
            <h1 id="welcomeMessage">Profile Loading...</h1>
            <p id="userEmailDisplay">Connecting...</p>

            <div class="input-group">
                <input type="text" id="photoURLInput" placeholder="Paste Image Link Here">
                <button id="btnUpdatePhoto">UPDATE PHOTO</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
