<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RAJA TECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="dashboard-body">
    <header class="header-fixed">
        <h2 class="logo">RAJATECH</h2>
        <button id="btnLogout" class="btn-outline">Logout</button>
    </header>

    <main class="container">
        <div class="profile-card animate-pop">
            <div class="avatar-container">
                <img id="userDP" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
            </div>
            <h1 id="welcomeUser">Loading...</h1>
            <p id="userEmail">Fetching details...</p>
            <div class="user-stats">
                <div class="stat"><span>UID:</span> <small id="userIdDisplay">---</small></div>
            </div>
            <div class="update-section">
                <input type="text" id="photoURL" placeholder="Paste Image URL here">
                <button id="btnUpdate" class="btn">Update Profile</button>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
